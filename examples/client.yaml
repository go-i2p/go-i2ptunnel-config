tunnels:
  MyClientTunnel:
    name: MyClientTunnel
    type: client
    interface: 127.0.0.1
    port: 7000
    target: example.i2p
    persistentKey: true
    description: Generic client tunnel for custom protocols
    i2cp:
      closeIdleTime: 1800000
      leaseSetEncType:
      - "4"
      - "0"
    options:
      gzip: false
    inbound:
      length: 3
      quantity: 2
    outbound:
      length: 3
      quantity: 2
