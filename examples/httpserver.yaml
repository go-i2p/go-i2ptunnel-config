tunnels:
  MyWebsite:
    name: MyWebsite
    type: httpserver
    target: 127.0.0.1
    persistentKey: true
    description: My personal eepsite
    i2cp:
      closeIdleTime: 1800000
      leaseSetEncType:
      - "4"
      - "0"
      newDestOnResume: false
    options:
      spoofedHost: mysite.i2p
      targetPort: 8080
    inbound:
      length: 3
      quantity: 3
    outbound:
      length: 3
      quantity: 3
