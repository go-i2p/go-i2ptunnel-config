tunnels:
  MyServerTunnel:
    name: MyServerTunnel
    type: server
    target: 127.0.0.1
    persistentKey: true
    description: Generic server tunnel for custom protocols
    i2cp:
      closeIdleTime: 1800000
      leaseSetEncType:
      - "4"
      - "0"
    options:
      gzip: false
      targetPort: 9000
    inbound:
      length: 3
      quantity: 3
    outbound:
      length: 3
      quantity: 3
