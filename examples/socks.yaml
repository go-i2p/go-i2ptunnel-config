tunnels:
  MySOCKSProxy:
    name: MySOCKSProxy
    type: sockstunnel
    interface: 127.0.0.1
    port: 9050
    persistentKey: true
    description: SOCKS5 proxy for I2P network access
    i2cp:
      closeIdleTime: 1800000
      leaseSetEncType:
      - "4"
      - "0"
    options:
      gzip: true
    inbound:
      length: 3
      quantity: 2
    outbound:
      length: 3
      quantity: 2
      randomKey: true
